<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alex's Data Assistant · Excel · MSSQL · Power BI</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0f11;--bg2:#18191e;--bg3:#22232a;
  --border:rgba(255,255,255,0.12);--border2:rgba(255,255,255,0.22);
  --text:#f0ede6;--muted:#a8a49c;
  --accent:#c8b97a;--accent2:#7ac8b2;
  --excel:#3d7a4a;--excel-bg:rgba(61,122,74,0.15);--excel-text:#7ed98f;
  --sql:#3a6fa8;--sql-bg:rgba(58,111,168,0.15);--sql-text:#8ac4f8;
  --pbi:#b87a2a;--pbi-bg:rgba(184,122,42,0.15);--pbi-text:#f8c97a;
  --font-display:'Fraunces',Georgia,serif;
  --font-body:'DM Sans',sans-serif;
  --font-mono:'DM Mono',monospace;
  --radius:10px;--radius-lg:16px;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:0.4;}
.page{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:2rem 1.25rem 4rem;}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;padding-bottom:1rem;border-bottom:0.5px solid var(--border);flex-wrap:wrap;gap:10px;}
.logo{display:flex;align-items:center;gap:12px;}
.logo-mark{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:15px;color:#0e0f11;font-weight:500;}
.logo-text{font-family:var(--font-display);font-size:18px;color:var(--text);font-weight:300;}
.logo-text span{color:var(--accent);font-style:italic;}
.header-right{display:flex;align-items:center;gap:12px;}
.status{display:flex;align-items:center;gap:6px;font-size:12px;color:#a0998f;}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--accent2);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.lang-switch{display:flex;border:0.5px solid var(--border2);border-radius:99px;overflow:hidden;}
.lang-btn{padding:5px 12px;font-size:12px;cursor:pointer;border:none;background:transparent;color:var(--muted);font-family:var(--font-body);transition:all 0.2s;}
.lang-btn.active{background:rgba(200,185,122,0.15);color:var(--accent);}
.hero{margin-bottom:1.75rem;}
.hero h1{font-family:var(--font-display);font-size:clamp(1.8rem,4vw,2.6rem);font-weight:300;line-height:1.15;margin-bottom:0.4rem;}
.hero h1 em{color:var(--accent);font-style:italic;}
.hero p{font-size:14px;color:#b0aca4;max-width:500px;line-height:1.7;}
.search-box{margin-bottom:1.25rem;}
.search-input{width:100%;padding:10px 14px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg2);font-size:14px;font-family:var(--font-body);color:var(--text);outline:none;}
.search-input::placeholder{color:var(--muted);}
.search-input:focus{border-color:var(--accent);}
.tabs{display:flex;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap;}
.tab{padding:7px 16px;border-radius:99px;border:0.5px solid var(--border2);background:transparent;font-size:13px;cursor:pointer;color:var(--muted);font-family:var(--font-body);transition:all 0.2s;}
.tab:hover{border-color:var(--accent);color:var(--text);}
.tab.active-all{border-color:var(--accent);color:var(--accent);background:rgba(200,185,122,0.08);}
.tab.active-excel{border-color:var(--excel);color:var(--excel-text);background:var(--excel-bg);}
.tab.active-sql{border-color:var(--sql);color:var(--sql-text);background:var(--sql-bg);}
.tab.active-pbi{border-color:var(--pbi);color:var(--pbi-text);background:var(--pbi-bg);}
.count{font-size:12px;color:#a0998f;margin-bottom:1rem;}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(400px,1fr));gap:12px;}
@media(max-width:600px){.cards-grid{grid-template-columns:1fr;}}
.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1.1rem 1.25rem;cursor:pointer;transition:border-color 0.2s;animation:fadeup 0.25s ease;}
@keyframes fadeup{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.card:hover{border-color:var(--border2);}
.card-top{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.badge{font-size:10px;font-family:var(--font-mono);padding:3px 9px;border-radius:99px;text-transform:uppercase;letter-spacing:0.05em;flex-shrink:0;}
.badge-excel{background:var(--excel-bg);color:var(--excel-text);border:0.5px solid var(--excel);}
.badge-sql{background:var(--sql-bg);color:var(--sql-text);border:0.5px solid var(--sql);}
.badge-pbi{background:var(--pbi-bg);color:var(--pbi-text);border:0.5px solid var(--pbi);}
.card-title{font-size:14px;font-weight:500;color:#f5f2eb;}
.card-desc{font-size:13px;color:#b0aca4;line-height:1.6;margin-bottom:8px;}
.card-toggle{font-size:11px;color:#9a9690;display:inline-flex;align-items:center;gap:5px;margin-bottom:0;}
.toggle-arrow{font-size:9px;transition:transform 0.2s;display:inline-block;}
.card.open .toggle-arrow{transform:rotate(90deg);}
.card-preview{background:var(--bg3);border-radius:8px;padding:12px;font-size:12.5px;font-family:var(--font-mono);color:var(--accent2);line-height:1.75;white-space:pre-wrap;margin-top:10px;display:none;border:0.5px solid var(--border);}
.card-note{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.6;display:none;font-style:italic;}
.card.open .card-preview,.card.open .card-note{display:block;}
.empty{text-align:center;padding:3rem;color:var(--muted);font-size:14px;}
footer{margin-top:3rem;padding-top:1.25rem;border-top:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.footer-name{font-family:var(--font-display);font-size:13px;color:#a0998f;font-style:italic;}
.certs{display:flex;gap:6px;flex-wrap:wrap;}
.cert{font-size:11px;font-family:var(--font-mono);padding:3px 8px;border-radius:99px;border:0.5px solid var(--border2);color:#a0998f;}
</style>
</head>
<body>
<div class="page">

<header>
  <div class="logo">
    <div class="logo-mark">AF</div>
    <div class="logo-text">Alex's <span>Data</span> Assistant</div>
  </div>
  <div class="header-right">
    <div class="lang-switch">
      <button class="lang-btn" onclick="setLang('de')" id="btn-de">DE</button>
      <button class="lang-btn active" onclick="setLang('ru')" id="btn-ru">RU</button>
    </div>
    <div class="status"><div class="status-dot"></div><span id="status-txt">Online</span></div>
  </div>
</header>

<div class="hero">
  <h1 id="hero-title">Твой личный <em>справочник</em></h1>
  <p id="hero-sub">Excel · MSSQL · Power BI — готовые примеры с объяснениями. Нажми на карточку чтобы увидеть код.</p>
</div>

<div class="search-box">
  <input class="search-input" id="searchinput" placeholder="Поиск по теме..." oninput="renderCards()" />
</div>

<div class="tabs" id="tabs">
  <button class="tab active-all" onclick="setTopic('all',this)" id="tab-all">Все темы</button>
  <button class="tab" onclick="setTopic('excel',this)" id="tab-excel">Excel</button>
  <button class="tab" onclick="setTopic('sql',this)" id="tab-sql">MSSQL</button>
  <button class="tab" onclick="setTopic('pbi',this)" id="tab-pbi">Power BI</button>
</div>

<div class="count" id="countlabel"></div>
<div class="cards-grid" id="cardsgrid"></div>

<footer>
  <div class="footer-name">Alexander Fritzler — Data Engineer & BI Consultant</div>
  <div class="certs">
    <span class="cert">MO-201</span>
    <span class="cert">DP-900</span>
    <span class="cert">PL-300</span>
    <span class="cert">DP-600</span>
  </div>
</footer>

</div>

<script>
let lang = 'ru';
let topic = 'all';

const i18n = {
  ru: {
    heroTitle: 'Твой личный <em>справочник</em>',
    heroSub: 'Excel · MSSQL · Power BI — готовые примеры с объяснениями. Нажми на карточку чтобы увидеть код.',
    search: 'Поиск по теме...',
    tabAll: 'Все темы',
    showExample: 'Показать пример',
    hideExample: 'Скрыть пример',
    found: 'Найдено',
    entries: 'примеров',
    noResults: 'Ничего не найдено. Попробуй другой запрос.',
    online: 'Online'
  },
  de: {
    heroTitle: 'Dein persönlicher <em>Nachschlagewerk</em>',
    heroSub: 'Excel · MSSQL · Power BI — fertige Beispiele mit Erklärungen. Klick auf eine Karte für den Code.',
    search: 'Thema suchen...',
    tabAll: 'Alle Themen',
    showExample: 'Beispiel anzeigen',
    hideExample: 'Beispiel verbergen',
    found: 'Gefunden',
    entries: 'Einträge',
    noResults: 'Nichts gefunden. Versuche einen anderen Begriff.',
    online: 'Online'
  }
};

const data = [
  // ═══ EXCEL ═══
  {
    topic:'excel',
    title:{ru:'VLOOKUP — вертикальный поиск',de:'VLOOKUP — vertikale Suche'},
    desc:{
      ru:'Ищет значение в первом столбце таблицы и возвращает значение из нужного столбца.',
      de:'Sucht einen Wert in der ersten Spalte und gibt den Wert aus der gewünschten Spalte zurück.'
    },
    code:`=VLOOKUP(A2; $D$2:$F$100; 2; 0)

-- A2        = искомое значение
-- $D$2:$F$100 = диапазон таблицы
-- 2         = номер столбца результата
-- 0         = точное совпадение`,
    note:{
      ru:'Совет: используй XLOOKUP вместо VLOOKUP — он мощнее и ищет в любом направлении.',
      de:'Tipp: Verwende XLOOKUP statt VLOOKUP — es ist leistungsfähiger und sucht in beide Richtungen.'
    }
  },
  {
    topic:'excel',
    title:{ru:'XLOOKUP — современный поиск',de:'XLOOKUP — moderne Suche'},
    desc:{
      ru:'Замена VLOOKUP. Ищет в любом направлении, возвращает несколько столбцов, есть значение по умолчанию.',
      de:'Ersatz für VLOOKUP. Sucht in beliebiger Richtung, gibt mehrere Spalten zurück, hat Standardwert.'
    },
    code:`=XLOOKUP(A2; D2:D100; E2:E100; "Не найдено")

-- A2        = искомое значение
-- D2:D100   = диапазон поиска
-- E2:E100   = диапазон результата
-- "Не найдено" = если нет совпадения`,
    note:{
      ru:'Доступен в Excel 365 и Excel 2021+.',
      de:'Verfügbar in Excel 365 und Excel 2021+.'
    }
  },
  {
    topic:'excel',
    title:{ru:'INDEX + MATCH — гибкий поиск',de:'INDEX + MATCH — flexible Suche'},
    desc:{
      ru:'Комбинация двух функций. Мощнее VLOOKUP — ищет в любом столбце, не только в первом.',
      de:'Kombination zweier Funktionen. Leistungsfähiger als VLOOKUP — sucht in beliebiger Spalte.'
    },
    code:`=INDEX(E2:E100; MATCH(A2; D2:D100; 0))

-- INDEX(диапазон_результата; позиция)
-- MATCH(искомое; диапазон_поиска; 0)
-- 0 = точное совпадение`,
    note:{
      ru:'Работает во всех версиях Excel, в отличие от XLOOKUP.',
      de:'Funktioniert in allen Excel-Versionen, im Gegensatz zu XLOOKUP.'
    }
  },
  {
    topic:'excel',
    title:{ru:'SUMIFS — сумма с условиями',de:'SUMIFS — Summe mit Bedingungen'},
    desc:{
      ru:'Суммирует значения при выполнении нескольких условий одновременно.',
      de:'Summiert Werte, wenn mehrere Bedingungen gleichzeitig erfüllt sind.'
    },
    code:`=SUMIFS(C2:C100; A2:A100; "Berlin"; B2:B100; ">1000")

-- C2:C100  = диапазон суммирования
-- A2:A100  = диапазон условия 1
-- "Berlin" = условие 1
-- B2:B100  = диапазон условия 2
-- ">1000"  = условие 2`,
    note:{
      ru:'Можно добавить сколько угодно пар условий.',
      de:'Es können beliebig viele Bedingungspaare hinzugefügt werden.'
    }
  },
  {
    topic:'excel',
    title:{ru:'COUNTIFS — подсчёт с условиями',de:'COUNTIFS — Zählen mit Bedingungen'},
    desc:{
      ru:'Считает количество ячеек, соответствующих нескольким условиям.',
      de:'Zählt die Anzahl der Zellen, die mehrere Bedingungen erfüllen.'
    },
    code:`=COUNTIFS(A2:A100; "Bayern"; B2:B100; ">=500")

-- A2:A100  = диапазон условия 1
-- "Bayern" = условие 1
-- B2:B100  = диапазон условия 2
-- ">=500"  = условие 2`,
    note:{
      ru:'Аналог SUMIFS, только считает количество, а не суммирует.',
      de:'Analog zu SUMIFS, zählt jedoch die Anzahl statt zu summieren.'
    }
  },
  {
    topic:'excel',
    title:{ru:'Сводная таблица (Pivot)',de:'Pivot-Tabelle'},
    desc:{
      ru:'Интерактивный инструмент для группировки и анализа данных без формул.',
      de:'Interaktives Werkzeug zur Gruppierung und Analyse von Daten ohne Formeln.'
    },
    code:`Шаги создания:
1. Выдели данные (Ctrl+A)
2. Вставка → Сводная таблица
3. Перетащи поля:
   - Строки: Продукт / Регион
   - Значения: Сумма (Umsatz)
   - Фильтры: Дата / Год
4. Правая кнопка → Обновить`,
    note:{
      ru:'Для обновления данных в Pivot — правая кнопка мыши → "Обновить".',
      de:'Zum Aktualisieren der Pivot-Daten: Rechtsklick → "Aktualisieren".'
    }
  },
  {
    topic:'excel',
    title:{ru:'Условное форматирование',de:'Bedingte Formatierung'},
    desc:{
      ru:'Автоматически меняет цвет ячеек в зависимости от значения.',
      de:'Ändert die Zellenfarbe automatisch abhängig vom Wert.'
    },
    code:`Шаги:
1. Выдели диапазон (напр. C2:C100)
2. Главная → Условное форматирование
3. Правила выделения ячеек:
   - "Больше чем" 1000 → зелёный
   - "Меньше чем" 500 → красный
4. Или: Цветовые шкалы (градиент)`,
    note:{
      ru:'Цветовые шкалы отлично работают для тепловых карт продаж.',
      de:'Farbskalen eignen sich hervorragend für Umsatz-Heatmaps.'
    }
  },
  {
    topic:'excel',
    title:{ru:'IFERROR — обработка ошибок',de:'IFERROR — Fehlerbehandlung'},
    desc:{
      ru:'Заменяет ошибку (#N/A, #DIV/0 и др.) на нужное значение или текст.',
      de:'Ersetzt Fehler (#N/A, #DIV/0 usw.) durch einen gewünschten Wert oder Text.'
    },
    code:`=IFERROR(VLOOKUP(A2;D2:F100;2;0); "Не найдено")

-- Если VLOOKUP выдаёт ошибку →
-- возвращает "Не найдено"
-- Вместо текста можно поставить 0 или ""`,
    note:{
      ru:'Всегда оборачивай VLOOKUP и деление в IFERROR — это хорошая практика.',
      de:'Immer VLOOKUP und Divisionen in IFERROR einwickeln — das ist gute Praxis.'
    }
  },

  // ═══ MSSQL ═══
  {
    topic:'sql',
    title:{ru:'SELECT — основной запрос',de:'SELECT — Grundabfrage'},
    desc:{
      ru:'Базовый синтаксис выборки данных из таблицы с фильтрацией и сортировкой.',
      de:'Grundlegende Syntax zur Datenabfrage aus einer Tabelle mit Filter und Sortierung.'
    },
    code:`SELECT 
    Produkt,
    Region,
    SUM(Umsatz) AS Gesamt_Umsatz
FROM dbo.Verkauf
WHERE Datum >= '2024-01-01'
    AND Region = 'Bayern'
GROUP BY Produkt, Region
ORDER BY Gesamt_Umsatz DESC;`,
    note:{
      ru:'ORDER: SELECT → FROM → WHERE → GROUP BY → HAVING → ORDER BY',
      de:'Reihenfolge: SELECT → FROM → WHERE → GROUP BY → HAVING → ORDER BY'
    }
  },
  {
    topic:'sql',
    title:{ru:'JOIN — объединение таблиц',de:'JOIN — Tabellen verbinden'},
    desc:{
      ru:'Объединяет строки из двух таблиц по ключевому полю. 4 основных типа.',
      de:'Verbindet Zeilen aus zwei Tabellen über ein Schlüsselfeld. 4 Haupttypen.'
    },
    code:`-- INNER JOIN: только совпадающие строки
SELECT k.Name, v.Umsatz
FROM Kunden k
INNER JOIN Verkauf v ON k.ID = v.Kunden_ID;

-- LEFT JOIN: все из левой + совпадения из правой
SELECT k.Name, v.Umsatz
FROM Kunden k
LEFT JOIN Verkauf v ON k.ID = v.Kunden_ID;

-- RIGHT JOIN: все из правой + совпадения из левой
-- FULL OUTER JOIN: все строки из обеих таблиц`,
    note:{
      ru:'LEFT JOIN — самый частый в реальной работе. INNER JOIN отбрасывает клиентов без продаж.',
      de:'LEFT JOIN ist in der Praxis am häufigsten. INNER JOIN schließt Kunden ohne Verkäufe aus.'
    }
  },
  {
    topic:'sql',
    title:{ru:'GROUP BY + HAVING',de:'GROUP BY + HAVING'},
    desc:{
      ru:'GROUP BY группирует строки. HAVING фильтрует уже сгруппированные результаты.',
      de:'GROUP BY gruppiert Zeilen. HAVING filtert die bereits gruppierten Ergebnisse.'
    },
    code:`SELECT 
    Region,
    COUNT(*) AS Anzahl_Verkauf,
    SUM(Umsatz) AS Gesamt,
    AVG(Umsatz) AS Durchschnitt
FROM dbo.Verkauf
GROUP BY Region
HAVING SUM(Umsatz) > 10000
ORDER BY Gesamt DESC;`,
    note:{
      ru:'WHERE фильтрует ДО группировки. HAVING фильтрует ПОСЛЕ группировки.',
      de:'WHERE filtert VOR der Gruppierung. HAVING filtert NACH der Gruppierung.'
    }
  },
  {
    topic:'sql',
    title:{ru:'CTE — общее табличное выражение',de:'CTE — Common Table Expression'},
    desc:{
      ru:'Временная именованная таблица внутри запроса. Делает код читаемым и структурированным.',
      de:'Temporäre benannte Tabelle innerhalb einer Abfrage. Macht den Code lesbar und strukturiert.'
    },
    code:`WITH Monatsumsatz AS (
    SELECT 
        Region,
        MONTH(Datum) AS Monat,
        SUM(Umsatz) AS Umsatz
    FROM dbo.Verkauf
    GROUP BY Region, MONTH(Datum)
)
SELECT 
    Region,
    Monat,
    Umsatz,
    LAG(Umsatz) OVER(PARTITION BY Region ORDER BY Monat) AS Vormonat
FROM Monatsumsatz;`,
    note:{
      ru:'CTE заменяет подзапросы — код становится в 2 раза читаемее.',
      de:'CTE ersetzt Unterabfragen — der Code wird doppelt so lesbar.'
    }
  },
  {
    topic:'sql',
    title:{ru:'Оконные функции (Window Functions)',de:'Fensterfunktionen (Window Functions)'},
    desc:{
      ru:'Вычисляют значение для каждой строки с учётом "окна" соседних строк.',
      de:'Berechnen einen Wert für jede Zeile unter Berücksichtigung eines "Fensters" benachbarter Zeilen.'
    },
    code:`SELECT 
    Datum,
    Umsatz,
    -- Нарастающий итог
    SUM(Umsatz) OVER(ORDER BY Datum) AS Kumulativ,
    -- Ранг по убыванию
    RANK() OVER(ORDER BY Umsatz DESC) AS Rang,
    -- Предыдущее значение
    LAG(Umsatz, 1) OVER(ORDER BY Datum) AS Vorherig,
    -- Скользящее среднее (7 дней)
    AVG(Umsatz) OVER(ORDER BY Datum ROWS 6 PRECEDING) AS MA7
FROM dbo.Verkauf;`,
    note:{
      ru:'OVER() без PARTITION BY = одно окно для всей таблицы.',
      de:'OVER() ohne PARTITION BY = ein Fenster für die gesamte Tabelle.'
    }
  },
  {
    topic:'sql',
    title:{ru:'Stored Procedure — хранимая процедура',de:'Stored Procedure — gespeicherte Prozedur'},
    desc:{
      ru:'Сохранённый SQL-код на сервере. Запускается по имени, принимает параметры.',
      de:'Auf dem Server gespeicherter SQL-Code. Wird mit Namen aufgerufen, akzeptiert Parameter.'
    },
    code:`CREATE PROCEDURE usp_Umsatz_nach_Region
    @Region NVARCHAR(50),
    @StartDatum DATE,
    @EndDatum DATE
AS
BEGIN
    SELECT

    FROM dbo.Verkauf

let currentTopic = 'all';

function setLang(l) {
  lang = l;
  document.getElementById('btn-de').classList.toggle('active', l==='de');
  document.getElementById('btn-ru').classList.toggle('active', l==='ru');
  const t = i18n[l];
  document.getElementById('hero-title').innerHTML = t.heroTitle;
  document.getElementById('hero-sub').textContent = t.heroSub;
  document.getElementById('searchinput').placeholder = t.search;
  document.getElementById('tab-all').textContent = t.tabAll;
  document.getElementById('status-txt').textContent = t.online;
  renderCards();
}

function setTopic(t, el) {
  currentTopic = t;
  document.querySelectorAll('.tab').forEach(b => {
    b.className = 'tab';
  });
  const classes = {all:'active-all',excel:'active-excel',sql:'active-sql',pbi:'active-pbi'};
  el.className = 'tab ' + classes[t];
  renderCards();
}

function renderCards() {
  const q = document.getElementById('searchinput').value.toLowerCase();
  const t = i18n[lang];
  const filtered = data.filter(d => {
    if (currentTopic !== 'all' && d.topic !== currentTopic) return false;
    if (q) {
      const searchStr = (d.title[lang] + d.desc[lang] + d.code).toLowerCase();
      return searchStr.includes(q);
    }
    return true;
  });

  document.getElementById('countlabel').textContent =
    t.found + ': ' + filtered.length + ' ' + t.entries;

  const grid = document.getElementById('cardsgrid');
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty">' + t.noResults + '</div>';
    return;
  }

  const badgeMap = {excel:'Excel',sql:'MSSQL',pbi:'Power BI'};
  grid.innerHTML = filtered.map((d, i) => `
    <div class="card" id="card-${i}" onclick="toggleCard(${i})">
      <div class="card-top">
        <span class="badge badge-${d.topic}">${badgeMap[d.topic]}</span>
        <span class="card-title">${d.title[lang]}</span>
      </div>
      <div class="card-desc">${d.desc[lang]}</div>
      <div class="card-toggle">
        <span class="toggle-arrow">▶</span>
        <span class="toggle-label">${t.showExample}</span>
      </div>
      <pre class="card-preview">${d.code}</pre>
      <div class="card-note">${d.note[lang]}</div>
    </div>
  `).join('');
}

function toggleCard(i) {
  const card = document.getElementById('card-'+i);
  const isOpen = card.classList.contains('open');
  const t = i18n[lang];
  card.classList.toggle('open');
  card.querySelector('.toggle-label').textContent =
    isOpen ? t.showExample : t.hideExample;
}

renderCards();
</script>
